version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    labels:
      - automation
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    labels:
      - automation
      - dependencies
    groups:
      npm-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 3

  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-name: nixpkgs
    labels:
      - automation
      - dependencies
