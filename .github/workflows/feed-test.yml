name: Feed test

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cache-key: feed-test

      - name: Run feed test
        run: nix develop -L .#node-build -c pnpm run test:http:feed
