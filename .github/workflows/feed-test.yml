name: Feed test

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cache-key: feed-test

      - name: Run feed test
        run: nix develop -L .#node-build -c pnpm run test:http:feed
