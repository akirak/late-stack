name: Feed test

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cache-key: feed-test

      - name: Run feed test
        run: nix develop -L .#node-build -c pnpm run test:http:feed
