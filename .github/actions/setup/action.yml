name: Install dependencies

description: Set up Nix with a GH-native cache enabled

inputs:
  cache-key:
    description: Suffix for the cache key to distinguish the package set
    required: true

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31.10.1

    - name: Prepare writable cache directories
      shell: bash
      run: |
        mkdir -p "${RUNNER_TEMP}/.cache/nix"
        echo "XDG_CACHE_HOME=${RUNNER_TEMP}/.cache" >> "$GITHUB_ENV"

    - name: Restore the package cache
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
      with:
        primary-key: nix-3-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/pnpm-lock.yaml') }}-${{ inputs.cache-key }}
        restore-prefixes-first-match: nix-3-${{ runner.os }}-
        gc-max-store-size-linux: 1G
        paths: |
          # Cache the pnpm content-addressable store, not the generated
          # node_modules symlink tree. Restoring the virtual store directly can
          # leave CI with an unwritable install layout and break `pnpm install`
          # with EACCES during symlink creation.
          ${{ runner.temp }}/pnpm-store
          # .output
          ~/.cache/ms-playwright

    - name: Check the node version
      shell: bash
      run: nix develop -L .#node-build -c sh -x -c 'node --version'

    - name: Install npm dependencies
      shell: bash
      env:
        pnpm_config_store_dir: ${{ runner.temp }}/pnpm-store
      run: nix develop -L .#node-build -c pnpm install --no-frozen-lockfile
